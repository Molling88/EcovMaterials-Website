<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact EcoV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      line-height: 1.7;
      color: #222;
      padding: 0 16px;
    }
    h1 {
      color: #1f7a4a;
      font-size: 2.2em;
      margin-bottom: 0.4em;
    }
    nav {
      margin-bottom: 30px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
    }
    nav a {
      margin-right: 15px;
      text-decoration: none;
      color: #1f7a4a;
      font-weight: bold;
    }
    nav a:hover { text-decoration: underline; }

    .contact-box {
      margin-top: 22px;
      padding: 20px;
      background: #f1f6f3;
      border-left: 4px solid #1f7a4a;
      border-radius: 10px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
      color: #1f7a4a;
    }
    input[type="text"], input[type="email"], textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cfd8d3;
      border-radius: 6px;
      font-size: 16px;
      font-family: inherit;
      box-sizing: border-box;
      background: #fff;
    }
    textarea { resize: vertical; }

    button {
      margin-top: 14px;
      background: #1f7a4a;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #145c38; }

    .small-note {
      margin-top: 12px;
      font-size: 0.95em;
    }
    .small-note a { font-weight: bold; }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid #dfe8e2;
      display: none;
    }
  </style>
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="what-we-do.html">What We Do</a>
    <a href="contact.html">Contact</a>
  </nav>

  <h1>Contact EcoV</h1>
  <p>
    We welcome conversations related to responsible recovery, circular sourcing, research collaboration, and partnership opportunities.
  </p>

  <div class="contact-box">
    <h2 style="margin:0 0 10px; color:#1f7a4a;">Send us a message</h2>

    <form action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="27eeb4ab-bcac-48d5-b1e6-f105535b25b8">

      <!-- basic spam protection -->
      <input type="checkbox" name="botcheck" style="display:none">

      <label for="name">Name</label>
      <input id="name" type="text" name="name" autocomplete="name" required>

      <label for="email">Email</label>
      <input id="email" type="email" name="email" autocomplete="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit">Send Message</button>
    </form>

    <div class="small-note">
      Prefer email? <a href="mailto:info@ecovmaterials.com">info@ecovmaterials.com</a>
    </div>
  </div>

  <p style="margin-top:18px;">
