<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact EcoV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      line-height: 1.7;
      color: #222;
      padding: 0 16px;
    }

    h1{ color:#1f7a4a; margin-bottom: .35em; }

    nav{
      margin-bottom: 22px;
      padding-bottom: 10px;
      border-bottom: 1px solid #ddd;
      display:flex;
      gap:14px;
      flex-wrap: wrap;
    }

    nav a{
      text-decoration:none;
      color:#1f7a4a;
      font-weight:bold;
    }
    nav a:hover{ text-decoration:underline; }

    .contact-box{
      margin-top: 18px;
      padding: 18px;
      background:#f1f6f3;
      border-left:4px solid #1f7a4a;
      border-radius: 10px;
    }

    label{
      display:block;
      margin-top: 12px;
      font-weight: 700;
    }

    input, textarea{
      width:100%;
      padding: 12px 12px;
      margin-top: 6px;
      border:1px solid #cfd8d3;
      border-radius: 8px;
      box-sizing:border-box;
      font-family: inherit;
      font-size: 16px; /* prevents iOS zoom on focus */
      background:#fff;
    }

    textarea{ resize: vertical; }

    .actions{
      display:flex;
      gap:12px;
      align-items:center;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    button{
      background:#1f7a4a;
      color:#fff;
      border:none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor:pointer;
      font-weight: 800;
      font-size: 16px;
    }
    button:hover{ background:#155c35; }
    button:disabled{
      opacity: .7;
      cursor: not-allowed;
    }

    .status{
      display:none;
      margin-top: 14px;
      padding: 12px 12px;
      border-radius: 10px;
      border: 1px solid #dfe8e2;
      background: #ffffff;
    }
    .status.success{
      display:block;
      border-color: rgba(31,122,74,.35);
      background: rgba(31,122,74,.08);
    }
    .status.error{
      display:block;
      border-color: rgba(185,28,28,.35);
      background: rgba(185,28,28,.08);
    }

    .small-note{
      margin-top: 12px;
      font-size: .95em;
    }

    /* Mobile polish */
    @media (max-width: 600px){
      body{ margin: 20px auto; }
      .contact-box{ padding: 14px; }
      .actions{ flex-direction: column; align-items: stretch; }
      button{ width:100%; }
    }
  </style>
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="what-we-do.html">What We Do</a>
    <a href="contact.html">Contact</a>
  </nav>

  <h1>Contact EcoV</h1>
  <p>
    We welcome conversations related to responsible recovery, circular sourcing,
    research collaboration, and partnership opportunities.
  </p>

  <div class="contact-box">
    <h2 style="margin:0 0 10px; color:#1f7a4a;">Send us a message</h2>

    <form id="contact-form" action="https://api.web3forms.com/submit" method="POST" novalidate>
      <input type="hidden" name="access_key" value="27eeb4ab-bcac-48d5-b1e6-f105535b25b8">
      <input type="checkbox" name="botcheck" style="display:none">

      <label for="name">Name</label>
      <input id="name" type="text" name="name" autocomplete="name" required>

      <label for="email">Email</label>
      <input id="email" type="email" name="email" autocomplete="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <div class="actions">
        <button id="sendBtn" type="submit">Send Message</button>
      </div>

      <div id="formStatus" class="status" role="status" aria-live="polite"></div>
    </form>

    <p class="small-note">
      Prefer email? <a href="mailto:info@ecovmaterials.com">info@ecovmaterials.com</a>
    </p>
  </div>

  <p style="margin-top:18px;">
    We aim to respond to all inquiries as efficiently as possible.
  </p>

  <script>
    const form = document.getElementById('contact-form');
    const statusBox = document.getElementById('formStatus');
    const sendBtn = document.getElementById('sendBtn');

    function showStatus(type, message){
      statusBox.className = 'status ' + type;
      statusBox.textContent = message;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Basic front-end validity check
      if (!form.checkValidity()) {
        showStatus('error', 'Please complete all fields (Name, Email, Message) before sending.');
        return;
      }

      sendBtn.disabled = true;
      showStatus('success', 'Sending…');

      try {
        const formData = new FormData(form);

        const response = await fetch(form.action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        const data = await response.json().catch(() => ({}));

        if (response.ok) {
          form.reset();
          showStatus('success', 'Thanks — your message has been sent. We’ll get back to you soon.');
        } else {
          showStatus('error', (data && data.message) ? data.message : 'Something went wrong. Please try again or email us directly.');
        }
      } catch (err) {
        showStatus('error', 'Network error. Please try again or email us directly.');
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
